<!DOCTYPE html>
<html>
<head>
    <title>AgentOS Extension</title>
    <style>
        body { font-family: sans-serif; padding: 10px; width: 250px; background: #141417; color: white; }
        h3 { color: #3b82f6; margin-top: 0; }
        .status { padding: 5px; border-radius: 4px; background: #10b981; color: black; font-weight: bold; text-align: center; margin-bottom: 10px; }
        .input-group { margin-bottom: 10px; }
        input[type="text"] { width: 100%; box-sizing: border-box; padding: 5px; }
        button { width: 100%; padding: 8px; background: #3b82f6; color: white; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <h3>AgentOS Guard</h3>
    <div class="status">Active (Governing)</div>
    
    <div class="input-group">
        <label>Current Root Intent:</label>
        <input type="text" id="intentInput" placeholder="e.g. Buy a laptop">
    </div>
    <button id="updateBtn">Update Intent</button>
</body>
</html>
